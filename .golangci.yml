version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: indent-error-flow
        - name: unused-parameter

formatters:
  enable:
    - gofmt
