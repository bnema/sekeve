syntax = "proto3";
package sekeve.v1;
option go_package = "github.com/bnema/sekeve/gen/proto/sekeve/v1;sekevev1";

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_LOGIN = 1;
  ENTRY_TYPE_SECRET = 2;
  ENTRY_TYPE_NOTE = 3;
}

service Sekeve {
  rpc Authenticate(AuthRequest) returns (AuthChallenge);
  rpc VerifyChallenge(ChallengeResponse) returns (SessionToken);
  rpc CreateEntry(CreateEntryRequest) returns (CreateEntryResponse);
  rpc UpdateEntry(UpdateEntryRequest) returns (UpdateEntryResponse);
  rpc GetEntry(GetEntryRequest) returns (Entry);
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  rpc DeleteEntry(DeleteEntryRequest) returns (DeleteEntryResponse);
  rpc HasPIN(HasPINRequest) returns (HasPINResponse);
  rpc SetPIN(SetPINRequest) returns (SetPINResponse);
  rpc Unlock(UnlockRequest) returns (UnlockResponse);
}

message AuthRequest {
  string gpg_key_id = 1;
}

message AuthChallenge {
  bytes encrypted_challenge = 1;
}

message ChallengeResponse {
  string nonce = 1;
}

message SessionToken {
  string token = 1;
  int64 expires_at = 2;
  bool requires_pin = 3;
  string unlock_ticket = 4;
}

message Entry {
  string id = 1;
  string name = 2;
  EntryType type = 3;
  map<string, string> meta = 4;
  bytes payload = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
}

message CreateEntryRequest {
  Entry entry = 1;
}

message CreateEntryResponse {
  string id = 1;
}

message UpdateEntryRequest {
  Entry entry = 1;
}

message UpdateEntryResponse {}

message GetEntryRequest {
  string id = 1;
}

message ListEntriesRequest {
  EntryType type = 1;
}

message ListEntriesResponse {
  repeated Entry entries = 1;
}

message DeleteEntryRequest {
  string id = 1;
}

message DeleteEntryResponse {}

message HasPINRequest {}

message HasPINResponse {
  bool has_pin = 1;
}

message SetPINRequest {
  string current_pin = 1; // empty on first setup
  string new_pin = 2;
}

message SetPINResponse {}

message UnlockRequest {
  string unlock_ticket = 1;
  string pin = 2;
}

message UnlockResponse {
  string token = 1;
  int64 expires_at = 2;
}
