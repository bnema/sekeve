services:
  sekeve-server:
    build: .
    env_file:
      - path: .env
        required: false
    command: ["server", "start", "--data", "/data/sekeve.db", "--addr", ":50051"]
    ports:
      - "127.0.0.1:${SEKEVE_SERVER_PORT:-50051}:50051"
    volumes:
      - sekeve-data:/data
    healthcheck:
      test: ["CMD", "grpc-health-probe", "-addr=:50051"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  sekeve-data:
